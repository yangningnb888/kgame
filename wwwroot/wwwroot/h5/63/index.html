<!DOCTYPE html>
<html>
<head>
  <!-- 登录入口：无 token 时由下方账号登录层显示登录框，不再自动游客登录。
       URL 已带 token（可选带 gtype 深度链接）时直接启动游戏/大厅。 -->

  <!-- 账号登录层：URL 不含 token 时注入纯 HTML 登录表单。
       登录成功 -> ?token=...&x=1（不带 gtype，boot 自动进入大厅首页）；
       游客入口 -> ?x=1（不带 gtype，同样进入大厅）。
       已带 token+gtype 的深度链接仍会直接进对应游戏。
       这样不依赖源码原生（本机独立启动下到不了的）Cocos 登录界面。 -->
  <!-- token 归一化：修复"进游戏->退出后 URL 变成 ?token=token%3D...%26x%3D1%26key%3Dpassword"
       的套娃问题。退出时 Cocos 会把整条 query 又塞进 token 参数，导致解析出的 token 畸形
       -> 后端认不出 -> 回退游客 -> 昵称显示 undefined。这里在游戏启动前把真正的 token 提取出来，
       把 URL 洗成干净的 ?token=<真token>&x=1 再交给游戏，避免退出后变 undefined。 -->
  <script type="text/javascript">
  (function () {
    var m = /[?&]token=([^&]*)/.exec(window.location.search);
    if (!m) return;
    var raw = decodeURIComponent(m[1]);
    // 真 token 形如 <前缀字母?><uid数字><40位hex>，从可能被套娃/夹带的字符串里抽出来
    var hit = raw.match(/[a-zA-Z]?\d{6,}[0-9a-f]{16,}/);
    var real = hit ? hit[0] : raw.replace(/^token=/, '').split('&')[0];
    if (real && real !== raw) {
      var base = window.location.href.split('?')[0].split('#')[0];
      if (base.charAt(base.length - 1) === '/') base += 'index.html';
      window.location.replace(base + '?token=' + encodeURIComponent(real) + '&x=1');
    }
  })();
  </script>

  <script type="text/javascript">
  (function () {
    var href = window.location.href;
    if (href.indexOf('token=') !== -1) return; // 已登录，交给游戏启动
    function showForm() {
      if (document.getElementById('acctLoginBox')) return;
      var d = document.createElement('div');
      d.id = 'acctLoginBox';
      d.style.cssText = 'position:fixed;left:0;top:0;right:0;bottom:0;background:#1b1f2a;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;z-index:99999';
      d.innerHTML =
        '<h2 style="margin-bottom:4px">捕鱼·账号登录</h2>' +
        '<div style="font-size:12px;opacity:.6;margin-bottom:14px">登录后进入大厅，可在大厅选择任意游戏</div>' +
        '<input id="accI" placeholder="手机号" style="margin:8px;padding:11px;width:260px;font-size:16px;border-radius:6px;border:none;outline:none">' +
        '<input id="pwdI" type="password" placeholder="密码" style="margin:8px;padding:11px;width:260px;font-size:16px;border-radius:6px;border:none;outline:none">' +
        '<button id="accBtn" style="margin:14px;padding:11px 36px;font-size:16px;border:none;border-radius:6px;background:#e6a23c;color:#fff;cursor:pointer">登录</button>' +
        '<div id="accMsg" style="color:#ff7676;height:20px;font-size:13px"></div>' +
        '<div style="margin-top:6px;font-size:12px;opacity:.7">测试账号 13800138000 / 123456　|　<a href="?x=1" style="color:#7ec8ff">游客登录</a>（进入大厅）</div>';
      document.body.appendChild(d);
      function doLogin() {
        var acc = document.getElementById('accI').value.trim();
        var pwd = document.getElementById('pwdI').value;
        var msg = document.getElementById('accMsg');
        if (!acc || !pwd) { msg.textContent = '请输入手机号和密码'; return; }
        msg.textContent = '登录中...';
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://' + location.hostname + '/kapi/login/login/dispatch', true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        xhr.send('data=' + encodeURIComponent(JSON.stringify({ event: 'Msg_User_Login', data: { telephone: acc, password: pwd, type: 2, code: -1, equipmentcard: '' } })));
        xhr.onload = function () {
          var j; try { j = JSON.parse(xhr.responseText); } catch (e) { msg.textContent = '返回解析失败'; return; }
          if (j && j.code === 200 && j.data && j.data.token) {
            var base = location.href.split('?')[0].split('#')[0];
            if (base.charAt(base.length - 1) === '/') base += 'index.html';
            // 不带 gtype -> boot 自动进入大厅首页
            location.replace(base + '?token=' + encodeURIComponent(j.data.token) + '&x=1');
          } else {
            msg.textContent = (j && j.msg) ? j.msg : '登录失败';
          }
        };
        xhr.onerror = function () { msg.textContent = '网络错误'; };
      }
      document.getElementById('accBtn').onclick = doLogin;
      document.getElementById('pwdI').addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', showForm);
    else showForm();
  })();
  </script>

  <meta charset="utf-8">

  <title>Cocos Creator | caijingtest</title>

  <!-- 移动端加载提示 -->
  <style>
    #kgame-loading {
      position: fixed; left: 0; top: 0; right: 0; bottom: 0;
      background: #1a1a2e; z-index: 999; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      color: #fff; font-family: sans-serif;
    }
    #kgame-loading .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #kgame-loading .text { font-size: 16px; color: #ccc; }
    #kgame-loading .sub { font-size: 12px; color: #888; margin-top: 6px; }
  </style>
  <script>
    // Cocos 启动成功后自动隐藏加载提示
    document.addEventListener('DOMContentLoaded', function() {
      var obs = new MutationObserver(function() {
        if (document.getElementById('GameCanvas') || document.getElementById('GameDiv')) {
          var ld = document.getElementById('kgame-loading');
          if (ld) ld.style.display = 'none';
          obs.disconnect();
        }
      });
      obs.observe(document.body, { childList: true, subtree: true });
    });
  </script>
  <!-- 加载提示占位 -->
  <div id="kgame-loading">
    <div class="spinner"></div>
    <div class="text">游戏资源加载中...</div>
    <div class="sub">首次加载约需 10-20 秒</div>
  </div>

  <!--http://www.html5rocks.com/en/mobile/mobifying/-->

<script type="text/javascript">
(function () {
    // open web debugger console
    if (typeof VConsole !== 'undefined') {
        window.vConsole = new VConsole();
    }

    var debug = window._CCSettings.debug;
    var splash = document.getElementById('splash');
    splash.style.display = 'none';

    function loadScript (moduleName, cb) {
      function scriptLoaded () {
          document.body.removeChild(domScript);
          domScript.removeEventListener('load', scriptLoaded, false);
          cb && cb();
      };
      var domScript = document.createElement('script');
      domScript.async = true;
      domScript.src = moduleName;
      domScript.addEventListener('load', scriptLoaded, false);
      document.body.appendChild(domScript);
    }

    loadScript(debug ? 'cocos2d-js.js' : 'cocos2d-js-min.9b359.js', function () {
      if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
        loadScript(debug ? 'physics.js' : 'physics-min.js', window.boot);
      }
      else {
        window.boot();
      }
    });
})();
</script>
