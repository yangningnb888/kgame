{extend name="../../admin/view/main"}
{block name="content"}
<div class="layui-card">
    <div class="layui-card-header">游戏弹窗公告</div>
    <div class="layui-card-body">
        <p class="help-block">
            以下内容会显示在游戏大厅的公告弹窗中。支持 HTML（如换行请使用 &lt;br&gt; 标签）。保存后玩家重新登录或重新连接大厅即可生效。
        </p>
        <div class="layui-form layui-form-pane margin-top-20">
            <div class="layui-form-item">
                <label class="layui-form-label">公告内容</label>
                <div class="layui-input-block">
                    <textarea id="notice_content" rows="12" class="layui-textarea" placeholder="请输入公告内容，支持 HTML">{$content}</textarea>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button id="save_notice" type="button" class="layui-btn layui-btn-normal">保存公告</button>
                    <span id="notice_tip" class="text-muted margin-left-10"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    require(['jquery'], function ($) {
        $('#save_notice').on('click', function () {
            var content = $('#notice_content').val();
            $.post('{:sysuri("admin/game_notice/save")}', {content: content}, function (res) {
                if (res.code == 1) {
                    layer.msg(res.msg);
                    $('#notice_tip').text('已保存').show();
                } else {
                    layer.msg(res.msg || '保存失败');
                    $('#notice_tip').text('').hide();
                }
            }, 'json').fail(function (xhr) {
                var msg = '保存失败：服务器无响应';
                if (xhr && xhr.responseText) {
                    msg = '保存失败：' + xhr.responseText.substring(0, 120);
                }
                layer.msg(msg);
            });
        });
    });
</script>
{/block}
