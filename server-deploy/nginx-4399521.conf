# ---------- B. 内部静态站（后台前端 SPA，只监听 127.0.0.1）----------
server { listen 127.0.0.1:8081; root "__WEB_ROOT__/aadmin";     index index.html; location / { try_files $uri $uri/ /index.html; } }  # PG 总控端
server { listen 127.0.0.1:8080; root "__WEB_ROOT__/web-mobile"; index index.html; location / { try_files $uri $uri/ /index.html; } }  # MJHL 大厅
server { listen 127.0.0.1:8082; root "__WEB_ROOT__/res";        autoindex off; }                                                       # 资源子包

# ---------- C. 对外 HTTPS 主站（玩家入口）----------
# 说明：初始只写 listen 80；执行 `certbot --nginx -d 域名` 后，
#      certbot 会自动改成 listen 443 ssl 并加证书、加 80→443 跳转。
server {
    listen 80;
    server_name __DOMAIN__;

    # 捕鱼/街机前端静态包
    root "__WEB_ROOT__/h5/63";
    index index.html;

    # 前端静态资源缺失应真 404（不要 SPA 兜底，否则漏文件会静默黑屏）
    location / {
        # 所有静态资源 no-cache：部署后浏览器/代理始终拉取最新，彻底消除缓存导致的黑屏/旧版本问题
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ =404;
    }

    # 游戏 WebSocket：wss://域名/gamews  ->  Workerman :16000
    location /gamews {
        proxy_pass http://127.0.0.1:16000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;   # 长连接，防止空闲被切
        proxy_send_timeout 3600s;
    }

    # 前端 httpServer：https://域名/tp63/  ->  内部 tp_63 (:8163)
    location /tp63/ {
        proxy_pass http://127.0.0.1:8163/;   # 末尾斜杠会剥掉 /tp63/ 前缀
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 可选：FastAPI 登录服务 kgame-api  ->  :9493
    location /kapi/ {
        proxy_pass http://127.0.0.1:9493/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ───────── 后台管理 ─────────
    # 系统管理后台 ThinkAdmin：https://域名/admin/  ->  内部 1_8788 (:8063)
    # 用"不带 URI 的 proxy_pass"保留 /admin/ 前缀，ThinkPHP 路由 s=/admin/... 才能正确命中
    location /admin/ {
        proxy_pass http://127.0.0.1:8063;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ThinkAdmin 静态资源（/static/、/upload/）->  内部 1_8788 (:8063)
    # 游戏前端 h5/63 不使用 /static/，故不会与下方根 location 冲突
    location /static/ {
        proxy_pass http://127.0.0.1:8063;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /upload/ {
        proxy_pass http://127.0.0.1:8063;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 游戏总控端 (PG总控制端 H5)：https://域名/aadmin/  ->  内部 aadmin (:8081)
    # ⚠️ 当前部署包未包含 aadmin 前端目录，该路径会 404，需先把 aadmin 文件加进仓库/部署
    location /aadmin/ {
        proxy_pass http://127.0.0.1:8081/;   # 末尾斜杠剥掉 /aadmin/ 前缀，映射到 8081 根
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 100m;
}
