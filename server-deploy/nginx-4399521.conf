# ============================================================================
# KGame nginx 站点配置  (Linux)
# 占位符会被 deploy.sh 自动替换：__DOMAIN__ / __WEB_ROOT__ / __FPM_SOCK__
#
# 结构：
#   A. 内部 PHP 应用（只监听 127.0.0.1，不对外，供反代复用）
#   B. 内部静态站（后台前端，只监听 127.0.0.1）
#   C. 对外 HTTPS 主站（server_name 域名，玩家入口）—— certbot 会把它升级为 443
# ============================================================================

# ---------- A. 内部 PHP 应用（ThinkPHP，fastcgi 到 php-fpm）----------
map $request_method $cors_ok { OPTIONS 1; default 0; }

# tp_63 游戏 API（前端 httpServer 走它：/login/login/dispatch 等）
server {
    listen 127.0.0.1:8163;
    root "__WEB_ROOT__/tp/tp_63/public";
    index index.php index.html;
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    location / { if ($request_method = OPTIONS) { return 204; } try_files $uri $uri/ /index.php?s=$uri&$args; }
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:__FPM_SOCK__;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
